<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js"></script>
    <title>Document</title>
  </head>
  <body>
    <div id="banner">
      <div id="odin-logo">
        <img src="/images/odin-lined.png" alt="The Odin project logo" />
        <h1>Odin</h1>
      </div>
    </div>
    <div id="main">
      <div class="campaign">
        This is not a real online service! You know you need something like this
        in your life to help you realize your deepest dreams.
        <br />Sign up <em>now</em> to get started. <br /><br />
        You know you want to.
      </div>
      <form method="" action="">
        <div>
          <h2>Let's do this!</h2>
          <p>
            <label for="firstname">FIRST NAME</label>
            <input type="text" name="user_first_name" id="firstname" />
          </p>
          <p>
            <label for="lastname">LAST NAME</label>
            <input type="text" name="user_last_name" id="lastname" />
          </p>
          <br />
          <p>
            <label for="email">EMAIL</label>
            <input type="email" name="user_email" id="email" />
          </p>
          <p>
            <label for="phonenumber">PHONE NUMBER</label>
            <input type="tel" name="user_phone_number" id="phonenumber" />
          </p>
          <br />
          <p>
            <label for="password">PASSWORD</label>
            <input type="password" name="user_password" id="password" />
          </p>
          <p>
            <label for="pswd-confirmation">CONFIRM PASSWORD</label>
            <input
              type="password"
              name="user_pswd_confirmation"
              id="pswd-confirmation"
            />
          </p>
        </div>
        <p>
          <button type="submit">Create Account</button>
        </p>
        <p class="login-link">Already have an account? <a href="">Log in</a></p>
      </form>
    </div>
  </body>
</html>
